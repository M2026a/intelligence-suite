    sceneBtns.innerHTML = '';
  }
  applyLinks();
  updateTopLinks();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function buildQuery() {
  const region = document.getElementById('region').value.trim();
  const pref = document.getElementById('pref').value.trim();
  const area = document.getElementById('area').value.trim();
  const subcat = document.getElementById('subcat').value.trim();
  const scene = document.getElementById('scene').value.trim();
  const place = [pref || region, area].filter(Boolean).join(' ');
  return [place, subcat, scene].filter(Boolean).join(' ').trim();
}

function applyLinks() {
  const query = buildQuery();
  document.getElementById('queryPreview').textContent = query || '未入力';
  document.getElementById('srcBtns').innerHTML = currentCat.sources.map(src => {
    const href = src.url_template.replace('{query}', encodeURIComponent(query));
    return `<a class="btn" href="${href}" target="_blank" rel="noopener">${esc(src.name)}</a>`;
  }).join('');
}

function updatePrefectures() {
  const region = document.getElementById('region').value;
  const prefSel = document.getElementById('pref');
  const prefs = REGION_PREFECTURES[region] || [];
  prefSel.innerHTML = '<option value=""></option>' +
    prefs.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  updateAreaHints(true);
}

function updateAreaHints(resetArea) {
  const pref = document.getElementById('pref').value;
  const areaList = document.getElementById('area-list');
  const areaInput = document.getElementById('area');
  const areas = PREFECTURE_AREAS[pref] || [];
  areaList.innerHTML = areas.map(a => `<option value="${esc(a)}">`).join('');
  if (resetArea) areaInput.value = '';
  applyLinks();
}

function setSubcat(val) {
  document.getElementById('subcat').value = val;
  applyLinks();
}

function setScene(val) {
  const scene = document.getElementById('scene');
  if (scene) {
    scene.value = val;
  }
  applyLinks();
}

function updateTopLinks() {
  document.getElementById('topLinks').innerHTML =
    currentCat.sources.map((src, i) => {
      const href = src.url_template.replace('{query}', '');
      return (i > 0 ? ' / ' : '') +
        `<a href="${href}" target="_blank" rel="noopener">${esc(src.name)}</a>`;
    }).join('');
}

function clearInputs() {
  document.getElementById('region').selectedIndex = 0;
  updatePrefectures();
  document.getElementById('pref').selectedIndex = 0;
  document.getElementById('area').value = '';
  document.getElementById('subcat').selectedIndex = 0;
  const scene = document.getElementById('scene');
  if (scene) scene.selectedIndex = 0;
  applyLinks();
}

document.getElementById('region').addEventListener('change', applyLinks);
document.getElementById('pref').addEventListener('change', applyLinks);
document.getElementById('area').addEventListener('input', applyLinks);
document.getElementById('area').addEventListener('change', applyLinks);
document.getElementById('subcat').addEventListener('change', applyLinks);
document.getElementById('scene').addEventListener('change', applyLinks);

switchCat(CATEGORIES[0].id);
</script>
</body>
</html>
