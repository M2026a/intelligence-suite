<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plot Engine | 発想の種</title>
<style>
  :root {
    --bg:      #0f1117;
    --panel:   #181c24;
    --panel2:  #1e2330;
    --line:    #2a2f3d;
    --text:    #e8eaf0;
    --muted:   #8892a4;
    --accent:  #5b9cf6;
    --c-sf:      #4e9eff;
    --c-fantasy: #a970e8;
    --c-mystery: #e89c40;
    --c-horror:  #e85555;
    --c-game:    #44c98a;
    --c-default: #8892a4;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", Meiryo, "Yu Gothic", Arial, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── topbar ─── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    flex: 0 0 auto;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: 10px 16px;
  }
  .topbar-inner {
    max-width: 1480px;
    margin: 0 auto;
  }
  .app-header {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 2px;
    flex-wrap: wrap;
  }
  .app-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .app-sep {
    font-size: 16px;
    color: var(--line);
    margin: 0 10px;
  }
  .app-subtitle {
    font-size: 14px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .app-updated {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 0;
  }

  
  .control-panel {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--panel);
  }

  .toolbar-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    align-items: end;
  }
  .field {
    min-width: 0;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin: 0 0 4px;
    line-height: 1.2;
  }
  .field input,
  .field select,
  .field button {
    width: 100%;
    min-width: 0;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 5px;
    font-size: 12px;
    padding: 6px 8px;
    height: 30px;
    font-family: inherit;
  }
  .field input::placeholder { color: var(--muted); }
  .field button { cursor: pointer; }
  .field button.primary {
    background: #1d3a6e;
    border-color: #2d5aa8;
    color: #fff;
    font-weight: 600;
    transition: background 0.15s;
  }
  .field button.primary:hover { background: #2548a0; }
  .field button.secondary {
    background: var(--panel2);
    border-color: var(--line);
    color: var(--muted);
  }
  #resetAllBtn {
    background: #4a2026;
    border-color: #8f3d4a;
    color: #ffd8dd;
    font-weight: 600;
  }
  #resetAllBtn:hover {
    background: #5b2730;
  }
  #saveSettingsBtn {
    background: #173a2d;
    border-color: #2d7a5d;
    color: #d9ffef;
    font-weight: 600;
  }
  #saveSettingsBtn:hover {
    background: #1d4b39;
  }

  .toolbar-main-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    align-items: end;
  }

  /* ★ 追加：ボタン折り返し防止（リセット対策） */
  .toolbar-main-actions button {
    white-space: nowrap;
    min-width: 0;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .btn-inline {
    width: auto;
    height: 28px;
    padding: 0 10px;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid var(--line);
    background: var(--panel2);
    color: var(--muted);
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  #toggleStatsBtn {
    background: #2a2354;
    border-color: #5b4ab8;
    color: #e4ddff;
    font-weight: 600;
  }
  #toggleStatsBtn:hover {
    background: #342c69;
  }
  .history-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .status-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn-danger {
    background: #4a2026;
    border-color: #8f3d4a;
    color: #ffd8dd;
    font-weight: 600;
  }

  /* ─── content ─── */
  .content {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 12px 16px 24px;
  }
  .content-inner {
    max-width: 1480px;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .toolbar-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .control-panel {
      padding: 10px;
    }
  }

  @media (max-width: 600px) {
    .topbar { padding: 10px 12px; }
    .content { padding: 10px 12px 20px; }
    .toolbar-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
    }
    .field label {
      font-size: 10px;
      margin-bottom: 3px;
    }
    .field input,
    .field select,
    .field button {
      font-size: 12px;
      height: 32px;
      padding: 6px 8px;
    }
    .toolbar-main-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .status-row {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .status-actions,
    .history-actions {
      gap: 6px;
    }
    .btn-inline {
      height: 26px;
      padding: 0 8px;
      font-size: 11px;
    }
    .cards {
      grid-template-columns: 1fr;
    }
  }

  .content {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 12px 16px 24px;
  }
  .content-inner {
    max-width: 1480px;
    margin: 0 auto;
  }

  /* ─── stats panel ─── */
  .collapse {
    margin-bottom: 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    background: var(--panel);
  }
  .collapse summary {
    cursor: pointer; list-style: none;
    padding: 8px 12px; font-size: 12px; color: var(--muted);
  }
  .collapse summary::-webkit-details-marker { display: none; }
  .collapse-body { padding: 0 12px 10px; font-size: 12px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 10px;
    background: var(--panel2);
    font-size: 11px;
  }

  /* ─── cards ─── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
  }
  .card {
    border: 1px solid var(--line);
    border-top: 3px solid var(--gc, var(--line));
    border-radius: 10px;
    background: var(--panel);
    padding: 14px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .card h3 {
    margin: 0;
    font-size: 15px;
    color: #fff;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .genre-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--gc, var(--muted));
    border: 1px solid rgba(255,255,255,0.12);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .label { color: var(--muted); font-size: 11px; margin-bottom: 5px; }
  .story {
    line-height: 1.75;
    font-size: 13px;
    margin-bottom: 12px;
    color: #cdd0d8;
  }
  .structure {
    border-top: 1px solid var(--line);
    padding-top: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 12px;
    font-size: 12px;
  }
  .s-item { display: flex; gap: 4px; }
  .s-key { color: var(--muted); flex-shrink: 0; }
  .s-val { color: #c8ccd8; }
  .s-full { grid-column: 1 / -1; }
  .card-footer {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
  }
  .btn-save {
    font-size: 11px; padding: 4px 12px; height: auto;
    background: transparent; border: 1px solid var(--line);
    color: var(--muted); border-radius: 4px; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-save:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save:disabled { opacity: 0.4; cursor: default; }

  .empty {
    border: 1px dashed var(--line); border-radius: 10px;
    padding: 40px; text-align: center;
    color: var(--muted); font-size: 14px;
  }

  @media (max-width: 900px) {
    .toolbar-head, .toolbar {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .toolbar-head { gap: 6px; }
  }

  @media (max-width: 600px) {
    .topbar { padding: 10px 12px; }
    .content { padding: 10px 12px 20px; }
    .toolbar-grid {
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 8px 10px;
    }

      font-size: 10px;
      margin-bottom: 3px;
    }
    .field input,
    .field select,
    .field button {
      font-size: 12px;
      height: 32px;
      padding: 6px 8px;
    }
    .toolbar-main-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .toolbar-main-actions button {
      white-space: nowrap;
      min-width: 0;
    }
    .status-row {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .status-actions,
    .history-actions {
      gap: 6px;
    }
    .btn-inline {
      height: 26px;
      padding: 0 8px;
      font-size: 11px;
    }
    .cards {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

    <div id="cards" class="cards"></div>
    <div id="empty" class="empty">「生成」を押すと、ここにプロットのヒントが表示されます。</div>
  </div>
</div>

    // 5: 問いかけ形式
    (p,kw,v1,v2,tw) =>
      `${p.opening}${kw}${p.conflict}という問いが、この物語を貫く。${v1}の${p.goal}という願いと、${p.relation}の関係が交差するとき、何もかもが${tw}に歪み始める。${p.cost}、そして${p.ending}${v2}。`,
    // 6: 気づきから
    (p,kw,v1,v2,tw) =>
      `${p.opening}${kw}${v1}が最初に気づいたのは、${p.conflict}の輪郭だった。${p.relation}を通じて${tw}に描かれていく${p.goal}という渇望。だが${p.cost}。物語の終わりには、${p.ending}${v2}。`

  /* ─── util ─── */
  function load(key, fb) {

    catch(_) { return fb; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function fillSel(sel, opts) {

    if (!form || typeof form !== 'object') return;

  /* ─── balanced pick ─── */
  function ensureBucket(bk, key, items) {
    if (!state.balance[bk]) state.balance[bk] = {};
    if (!state.balance[bk][key]) state.balance[bk][key] = {};
    const c = state.balance[bk][key];
    items.forEach(i => { if (c[i] == null) c[i] = 0; });
    return c;
  }
  function getList(bk, genre) {
    const t = G[bk];
    return (!genre || genre === '指定なし' ? t.default : (t[genre] || t.default)).slice();
  }
  function pickBalanced(bk, genre, forbidden) {
    const list = getList(bk, genre);
    const c = ensureBucket(bk, genre || 'default', list);
    const min = Math.min(...list.map(i => c[i]));
    let cands = list.filter(i => c[i] === min && !forbidden.has(i));
    if (!cands.length) {
      const next = Math.min(...list.filter(i => !forbidden.has(i)).map(i => c[i]));
      cands = list.filter(i => c[i] === next && !forbidden.has(i));
    }
    if (!cands.length) cands = list.filter(i => c[i] === min);
    const picked = rnd(cands);
    c[picked]++;
    return picked;
  }

  function coreKey(p) {
    return [p.conflict,p.relation,p.goal,p.cost,p.ending].join('｜');
  }
  function titleFor(genre, forbidden) {
    return pickBalanced('titleFront',genre,forbidden) + pickBalanced('titleBack',genre,forbidden);
  }
  function buildStory(p, tone, keyword, mainView, subView) {
    const tw = rnd(TONE_FLAVOR[tone] || TONE_FLAVOR['指定なし']);
    const kw = keyword ? `「${keyword}」を手がかりに、` : '';
    const v1 = mainView === '指定なし' ? '人物たち' : `${mainView}で描かれる人物たち`;
    const v2 = (subView && subView !== '指定なし' && subView !== '補助なし')
      ? `。さらに${subView}が、見えていない歪みを浮かび上がらせる` : '';
    return rnd(STORY_TMPLS)(p, kw, v1, v2, tw);
  }

  /* ─── render ─── */
  function render(cards, genre) {
    el.cards.innerHTML = '';
    el.empty.style.display = cards.length ? 'none' : 'block';
    const color = GENRE_COLOR[genre] || GENRE_COLOR['指定なし'];
    const label = GENRE_LABEL[genre] || '汎用';

    cards.forEach(card => {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.setProperty('--gc', color);
      div.innerHTML = `
        <div class="card-header">
          <h3>${card.title}</h3>
          <span class="genre-badge">${label}</span>
        </div>
        <div class="label">生成ストーリー</div>
        <div class="story">${card.story}</div>
        <div class="structure">
          <div class="s-item"><span class="s-key">対立軸：</span><span class="s-val">${card.conflict}</span></div>
          <div class="s-item"><span class="s-key">関係：</span><span class="s-val">${card.relation}</span></div>
          <div class="s-item"><span class="s-key">目的：</span><span class="s-val">${card.goal}</span></div>
          <div class="s-item"><span class="s-key">代償：</span><span class="s-val">${card.cost}</span></div>
          <div class="s-item s-full"><span class="s-key">結末：</span><span class="s-val">${card.ending}</span></div>
        </div>
        <div class="card-footer"></div>
      `;
      const btn = document.createElement('button');
      btn.textContent = '⭐ お気に入り保存';
      btn.className = 'btn-save';
      btn.addEventListener('click', () => {
        state.favorites.push(card);
        save(FAV_KEY, state.favorites);
        updateStats();
        btn.textContent = '✓ 保存済み';
        btn.disabled = true;
      });
      div.querySelector('.card-footer').appendChild(btn);
      el.cards.appendChild(div);
    });
  }

  function updateStats() {
    el.statsText.textContent = `履歴 ${state.history.length}件 / お気に入り ${state.favorites.length}件`;
    const freq = {};
    state.history.forEach(item => { freq[item.conflict] = (freq[item.conflict]||0)+1; });
    const top = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,6);
    el.statsChips.innerHTML = '';
    top.forEach(([name,count]) => {
      const c = document.createElement('div');
      c.className = 'chip';
      c.textContent = `${name} × ${count}`;
      el.statsChips.appendChild(c);
    });
  }

  function clearRenderedResults() {
    el.cards.innerHTML = '';
    el.empty.style.display = 'block';
  }

  function resetInputs() {
    el.keyword.value = '';
    el.genre.value = '指定なし';
    el.tone.value = '指定なし';
    el.mainView.value = '指定なし';
    el.subView.value = '指定なし';
    el.count.value = '5';
    el.diff.value = '強';
  }

  function resetAll() {
    resetInputs();
    state.lastBatchCore = new Set();
    localStorage.removeItem(FORM_KEY);
    clearRenderedResults();
    el.status.textContent = '入力内容をリセットしました';
  }

  function saveCurrentSettings() {
    save(FORM_KEY, getFormState());
    el.status.textContent = '入力内容を保存しました';
  }

  function clearHistoryAndSaved() {
    state.favorites = [];
    state.history = [];
    localStorage.removeItem(FAV_KEY);
    localStorage.removeItem(READ_KEY);
    clearRenderedResults();
    updateStats();
    el.status.textContent = '履歴・保存をクリアしました';
  }

  /* ─── generate ─── */
  function generate() {
    el.btn.disabled = true;
    el.status.textContent = '生成中...';

    const genre    = el.genre.value;
    const tone     = el.tone.value;
    const keyword  = el.keyword.value.trim();
    const mainView = el.mainView.value;
    const subView  = el.subView.value;
    const count    = Number(el.count.value || 5);
    const diff     = el.diff.value;

    const batch = [], batchCore = new Set(), forbidden = new Set();
    let attempts = 0;

    while (batch.length < count && attempts < 300) {
      attempts++;
      const conflict = pickBalanced('conflicts', genre, forbidden);
      const relation = pickBalanced('relations', genre, forbidden);
      const goal     = pickBalanced('goals',     genre, forbidden);
      const cost     = pickBalanced('costs',     genre, forbidden);
      const ending   = pickBalanced('endings',   genre, forbidden);
      const opening  = pickBalanced('openings',  genre, forbidden);
      const p = {conflict,relation,goal,cost,ending,opening};
      const key = coreKey(p);

      if (state.lastBatchCore.has(key) || batchCore.has(key)) continue;
      if (diff !== '標準') {
        const tooClose = state.history.slice(-24).some(h => {
          let s = 0;
          if (h.conflict===conflict) s+=3;
          if (h.relation===relation) s+=2;
          if (h.goal===goal)         s+=2;
          if (h.cost===cost)         s+=2;
          if (h.ending===ending)     s+=2;
          return s >= (diff==='最強' ? 4 : 6);
        });
        if (tooClose) continue;
      }

      batchCore.add(key);
      [conflict,relation,goal,cost,ending,opening].forEach(x => forbidden.add(x));
      batch.push({
        title: titleFor(genre, forbidden),
        story: buildStory(p, tone, keyword, mainView, subView),
        ...p
      });
    }

    state.lastBatchCore = batchCore;
    state.history.push(...batch);
    state.history = state.history.slice(-120);
    save(READ_KEY, state.history);
    save(BAL_KEY,  state.balance);
    render(batch, genre);
    updateStats();
    el.status.textContent = `生成完了：${batch.length}件 / 試行 ${attempts}回`;
    el.btn.disabled = false;
  }

  el.btn.addEventListener('click', generate);
  el.toggleStats.addEventListener('click', () => { el.statsPanel.open = !el.statsPanel.open; });
  el.resetAll.addEventListener('click', resetAll);
  el.clearHistory.addEventListener('click', clearHistoryAndSaved);
  updateStats();
})();
</script>
</body>
</html>
